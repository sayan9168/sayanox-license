<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayanox License | Secure. Open. Professional.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Rajdhani', sans-serif;
            color: #ffffff;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Allows mouse to interact with 3D behind */
        }

        .glass-card {
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 200, 0.2);
            border-radius: 20px;
            padding: 40px 60px;
            text-align: center;
            pointer-events: auto;
            box-shadow: 0 0 40px rgba(0, 255, 200, 0.1);
            max-width: 800px;
            width: 90%;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            margin: 0;
            background: linear-gradient(90deg, #00ffc8, #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 255, 200, 0.3);
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 1.5rem;
            color: #a0a0b0;
            margin: 10px 0 30px 0;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            color: #00ffc8;
            border: 1px solid #00ffc8;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #00ffc8;
            color: #000;
            box-shadow: 0 0 20px #00ffc8;
            transform: translateY(-3px);
        }

        .btn.secondary {
            border-color: #00aaff;
            color: #00aaff;
        }

        .btn.secondary:hover {
            background: #00aaff;
            color: #000;
            box-shadow: 0 0 20px #00aaff;
        }

        .features {
            display: flex;
            justify-content: space-around;
            margin-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .feature-item h3 {
            color: #00ffc8;
            margin: 0 0 5px 0;
            font-family: 'Orbitron', sans-serif;
        }

        .feature-item p {
            margin: 0;
            color: #888;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .glass-card { padding: 20px; }
            .features { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="glass-card">
            <h1>SAYANOX LICENSE</h1>
            <p class="subtitle">Secure. Open. Professional.</p>
            
            <div class="btn-group">
                <a href="https://github.com/sayan9168/sayanox-license" class="btn" target="_blank">View License</a>
                <a href="https://github.com/sayan9168/sayanox-cli" class="btn secondary" target="_blank">Get CLI Tool</a>
            </div>

            <div class="features">
                <div class="feature-item">
                    <h3>Automated</h3>
                    <p>One-click injection</p>
                </div>
                <div class="feature-item">
                    <h3>Universal</h3>
                    <p>All languages</p>
                </div>
                <div class="feature-item">
                    <h3>Open Source</h3>
                    <p>Free to use</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.002);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 2. Create 3D Objects (The Core & Wireframe)
        const geometry = new THREE.IcosahedronGeometry(1.5, 1);
        
        // Solid inner core
        const coreMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x00ffc8, 
            transparent: true, 
            opacity: 0.1 
        });
        const core = new THREE.Mesh(geometry, coreMaterial);
        scene.add(core);

        // Glowing wireframe
        const wireframeMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x00aaff, 
            wireframe: true 
        });
        const wireframe = new THREE.Mesh(geometry, wireframeMaterial);
        scene.add(wireframe);

        // 3. Particle System (Starfield)
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1500;
        const posArray = new Float32Array(particlesCount * 3);

        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 20; // Spread particles
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.02,
            color: 0x00ffc8,
            transparent: true,
            opacity: 0.8
        });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // 4. Mouse Interaction
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // 5. Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;

            // Rotate objects
            wireframe.rotation.y += 0.005;
            wireframe.rotation.x += 0.002;
            core.rotation.y -= 0.005;
            core.rotation.x -= 0.002;

            particlesMesh.rotation.y = -elapsedTime * 0.05;

            // Smooth mouse follow
            wireframe.rotation.y += 0.05 * (targetX - wireframe.rotation.y);
            wireframe.rotation.x += 0.05 * (targetY - wireframe.rotation.x);

            // Pulse effect
            const scale = 1 + Math.sin(elapsedTime * 2) * 0.05;
            wireframe.scale.set(scale, scale, scale);

            renderer.render(scene, camera);
        }

        animate();

        // 6. Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
      </html>
